name: Claude Code Local Action, reads website requirements , modifies the thing.
on: [push, workflow_dispatch]

jobs:
  build-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2
        with:
          model: qwen3-coder:7b # Usa un modelo más pequeño (7b) para que quepa en la RAM del runner (7GB aprox)

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code

      - name: Run Claude with local model
        env:
          ANTHROPIC_BASE_URL: http://localhost:11434
          ANTHROPIC_AUTH_TOKEN: ollama
        run: |
          # Lee los comandos desde el archivo y los pasa a Claude en modo 'headless'
          ls
          COMMANDS=$(cat .github/workflows/requirements.txt)
          claude "$COMMANDS" --yes
          
      - name: Run Claude and Generate Site
        env:
          ANTHROPIC_BASE_URL: http://localhost:11434
          ANTHROPIC_AUTH_TOKEN: ollama
        run: |
          # 1. Ejecutar Claude con las instrucciones del txt
          claude "$(cat requirements.txt)" --yes

      - name: Commit and Push changes
        run: |
          # 2. Configurar Git para que pueda hacer commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 3. Añadir archivos generados (ajusta la carpeta si es necesario)
          git add .
          
          # 4. Hacer commit solo si hay cambios
          if git diff --quiet && git diff --staged --quiet; then
            echo "No hay cambios que subir."
          else
            git commit -m "feat: website auto-generated by Claude Code & Qwen from requirements.txt"
            git push
          fi
