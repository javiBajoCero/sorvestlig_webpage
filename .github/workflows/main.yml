name: AI Code Assistant with Ollama
on: [push, workflow_dispatch]

jobs:
  ai-assist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2
        with:
          model: qwen2.5-coder:7b

      - name: Verify Ollama and Model
        run: |
          echo "Waiting for Ollama to be ready..."
          sleep 10
          ollama list

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install aider
        run: pip install aider-chat

      - name: Run AI Code Assistant (Non-Interactive)
        env:
          OLLAMA_API_BASE: http://localhost:11434
        run: |
          PROMPT=$(cat requirements.txt 2>/dev/null || echo "Review and document the PibScmc safety controller code")
          
          # Modo completamente automático - usa --message y --exit
          aider \
            --model ollama/qwen2.5-coder:7b \
            --yes-always \
            --auto-commits \
            --no-show-model-warnings \
            --no-pretty \
            --exit \
            --message "$PROMPT" \
            *.md \
            *.txt\
            *.html\
            *ico

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "feat: AI code review by Qwen 2.5 Coder"
            git push
          fi
