name: AI Code Assistant with Ollama
on: [push, workflow_dispatch]

jobs:
  ai-assist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Ollama Manually
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          
          # Start Ollama service in background
          ollama serve &
          
          # Wait for service to be ready
          echo "Waiting for Ollama to start..."
          sleep 15
          
          # Verify service is running
          curl -s http://localhost:11434/api/tags || {
            echo "Ollama failed to start"
            exit 1
          }

      - name: Pull Model
        run: |
          echo "Pulling qwen2.5-coder:7b model..."
          ollama pull qwen2.5-coder:7b
          
          echo "Verifying model is available..."
          ollama list
          
          # Test the model with a simple prompt
          echo "Testing model..."
          ollama run qwen2.5-coder:7b "Hello" --verbose

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install aider
        run: pip install aider-chat

      - name: Run AI Code Assistant
        env:
          OLLAMA_API_BASE: http://localhost:11434
        run: |
          PROMPT=$(cat requirements.txt 2>/dev/null || echo "Review the code and suggest improvements")
          # Modo completamente automático - usa --message y --exit
          aider \
            --model ollama/qwen2.5-coder:7b \
            --yes-always \
            --no-show-model-warnings \
            --exit \
            --message "$PROMPT" \
            *.md \
            *.txt\
            *.html\
            *ico

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "feat: AI code review by Qwen 2.5 Coder"
            git push
          fi
