name: Claude Code Local Action
on: [push, workflow_dispatch]

jobs:
  build-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2
        with:
          model: qwen2.5-coder:7b # Modelo optimizado para el límite de 7GB RAM de GitHub

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code

      - name: Run Claude and Generate Site
        env:
          ANTHROPIC_BASE_URL: http://localhost:11434
          ANTHROPIC_AUTH_TOKEN: ollama
        run: |
          # Usamos -p para modo script y definimos el modelo local explícitamente
          # Asegúrate de que requirements.txt esté en la raíz del repo
          claude -p "$(cat requirements.txt)" --model qwen2.5-coder:7b --dangerously-skip-permissions

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No hay cambios para subir."
          else
            git commit -m "feat: website updated by Claude Code (Local Qwen)"
            git push
          fi
